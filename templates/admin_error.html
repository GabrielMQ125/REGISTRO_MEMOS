<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Error - Administración</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .error-container {
            background: white;
            border-radius: 10px;
            padding: 30px 25px;
            text-align: center;
            max-width: 450px;
            width: 100%;
        }
        
        h1 {
            color: #dc3545;
            margin-bottom: 15px;
            font-size: 1.5rem;
        }
        
        p {
            color: #666;
            margin-bottom: 25px;
            font-size: 0.9rem;
            word-break: break-word;
        }
        
        .btn {
            display: inline-block;
            padding: 10px 20px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-size: 0.9rem;
        }
        
        @media (max-width: 480px) {
            .error-container {
                padding: 25px 20px;
            }
            
            h1 {
                font-size: 1.3rem;
            }
            
            p {
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
    <div class="error-container">
        <h1>❌ Error</h1>
        <p>{{ mensaje }}</p>
        <a href="/admin/panel" class="btn">Volver al Panel</a>
    </div>
</body>
</html>
