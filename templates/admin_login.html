<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Sistema de Evaluación</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #2d3748 0%, #1a202c 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            width: 100%;
            max-width: 400px;
        }
        h2 { text-align: center; color: #2d3748; margin-bottom: 10px; font-size: 28px; }
        .admin-badge {
            text-align: center;
            margin-bottom: 25px;
            color: #e53e3e;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
        }
        input[type="password"] {
            width: 100%;
            padding: 15px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 16px;
            margin-bottom: 20px;
        }
        input[type="password"]:focus {
            outline: none;
            border-color: #e53e3e;
        }
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #2d3748 0%, #1a202c 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        button:hover { transform: translateY(-2px); }
        .error { color: #e53e3e; text-align: center; margin-top: 15px; }
        .back-link { text-align: center; margin-top: 20px; }
        .back-link a { color: #718096; text-decoration: none; }
        .back-link a:hover { color: #2d3748; }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>🔐 Administración</h2>
        <div class="admin-badge">Acceso Restringido</div>
        <form method="POST">
            <input type="password" name="admin_password" placeholder="Contraseña" required autofocus>
            <button type="submit">Ingresar</button>
        </form>
        {% if error %}<div class="error">{{ error }}</div>{% endif %}
        <div class="back-link"><a href="/">← Volver al login</a></div>
    </div>
</body>
</html>
